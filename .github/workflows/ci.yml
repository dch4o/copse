name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-test:
    name: build & test (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
      CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCOPSE_BUILD_BENCHMARKS=OFF -DCOPSE_WERROR=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCOPSE_BUILD_BENCHMARKS=OFF
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
      - name: Build
        run: cmake --build build
      - name: Test (sanitized)
        run: ctest --test-dir build --output-on-failure

  install-consume:
    name: install + find_package (shared=${{ matrix.shared }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shared: [OFF, ON]
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Build & install copse
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCOPSE_BUILD_TESTS=OFF -DCOPSE_BUILD_BENCHMARKS=OFF \
            -DBUILD_SHARED_LIBS=${{ matrix.shared }}
          cmake --build build
          cmake --install build --prefix "$PWD/prefix"
      - name: Downstream find_package build + run
        run: |
          cmake -S examples/find_package -B examples/find_package/build -G Ninja \
            -DCMAKE_PREFIX_PATH="$PWD/prefix"
          cmake --build examples/find_package/build
          LD_LIBRARY_PATH="$PWD/prefix/lib" ./examples/find_package/build/example
