name: Benchmark CV

# Manual one-off: measure the run-to-run coefficient of variation of the
# benchmarks on a GitHub-hosted runner, to ground any future regression
# threshold. Not part of the regular CI path.
on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Repeat runs per benchmark binary"
        default: "15"
      samples:
        description: "Catch2 --benchmark-samples per run"
        default: "50"

permissions:
  contents: read

jobs:
  measure:
    name: measure run-to-run CV
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Build benchmarks (Release)
        run: |
          set -eu
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCOPSE_BUILD_TESTS=OFF -DCOPSE_BUILD_BENCHMARKS=ON
          cmake --build build -j "$(nproc)"
      - name: Run each benchmark ${{ inputs.runs }}x
        run: |
          set -eu
          mkdir -p cv-xml
          for bench in bench_insert bench_search bench_rebuild bench_remove; do
            bin=$(find build -name "$bench" -type f -perm -u+x | head -1)
            for i in $(seq 1 "${{ inputs.runs }}"); do
              "$bin" --reporter xml --benchmark-samples "${{ inputs.samples }}" \
                --out "cv-xml/${bench}.run${i}.xml"
            done
          done
      - name: Compute CV
        run: |
          {
            echo "### Benchmark run-to-run CV"
            echo
            echo "| binary | benchmark | runs | mean (ns) | stddev (ns) | CV % |"
            echo "|---|---|--:|--:|--:|--:|"
            awk '
              function bench(f,  b){ b=f; sub(/.*\//,"",b); sub(/\.run[0-9]+\.xml$/,"",b); return b }
              /<BenchmarkResults / { nm=$0; sub(/.*name="/,"",nm); sub(/".*/,"",nm); key=bench(FILENAME) SUBSEP nm }
              /<mean / { v=$0; sub(/.*value="/,"",v); sub(/".*/,"",v); n[key]++; s[key]+=v; q[key]+=v*v; bin[key]=bench(FILENAME); cas[key]=nm }
              END { for (k in n){ c=n[k]; m=s[k]/c; var=(c>1)?(q[k]-c*m*m)/(c-1):0; sd=(var>0)?sqrt(var):0; cv=(m!=0)?100*sd/m:0; printf "| %s | %s | %d | %.1f | %.1f | %.2f |\n", bin[k], cas[k], c, m, sd, cv } }
            ' cv-xml/*.xml | sort
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload raw XML
        uses: actions/upload-artifact@v7
        with:
          name: bench-cv-xml
          path: cv-xml/
