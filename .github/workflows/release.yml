name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-publish:
    name: build packages & publish pre-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build dpkg-dev file
      - name: Resolve version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build shared library (for .deb)
        run: |
          set -eu
          mkdir -p dist
          cmake -S . -B build-shared -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCOPSE_BUILD_TESTS=OFF -DCOPSE_BUILD_BENCHMARKS=OFF \
            -DBUILD_SHARED_LIBS=ON
          cmake --build build-shared
      - name: Build .deb packages (runtime + dev)
        run: |
          set -eu
          # CPack config is generated by the shared build above; produces
          # libcopse<soversion> (runtime) and libcopse-dev (dev) into dist/.
          cpack -G DEB --config build-shared/CPackConfig.cmake -B dist
          for d in dist/*.deb; do
            echo "## $(basename "$d")"
            dpkg-deb -I "$d" | grep -iE 'Package:|Version:|Depends:|Section:'
          done
      - name: Extract release notes from CHANGELOG
        run: |
          awk -v v="$VERSION" '
            $0 ~ ("^## \\[" v "\\]") { f=1; next }
            /^## \[/      { if (f) exit }
            /^\[[^]]+\]: / { if (f) exit }
            f
          ' CHANGELOG.md > notes.md
          cat notes.md
      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            --prerelease \
            dist/*.deb
